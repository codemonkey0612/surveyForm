<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Qooco 無料トライアル登録</title>

  <!-- LIFF -->
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <!-- Confetti -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #e3f2fd, #e8f5e9);
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background: #fff;
      padding: 30px 24px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 420px;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #2c3e50;
    }

    label {
      font-size: 14px;
      margin-bottom: 6px;
      display: block;
      color: #555;
    }

    .icon-label {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ddd;
      margin-bottom: 16px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #42a5f5, #66bb6a);
      color: white;
      font-weight: bold;
      cursor: pointer;
      font-size: 16px;
    }

    button:disabled {
      background: #aaa;
      cursor: not-allowed;
    }

    #error-msg {
      display: none;
      color: #c0392b;
      background: #fdecea;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 10px;
    }

    .modal {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.4);
      display: none;
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: white;
      padding: 24px;
      border-radius: 16px;
      text-align: center;
      animation: fadeIn 0.3s ease;
    }

    .success-icon {
      font-size: 48px;
      animation: pop 0.4s ease;
    }

    @keyframes pop {
      0%   { transform: scale(0.5); opacity: 0; }
      70%  { transform: scale(1.2); }
      100% { transform: scale(1);   opacity: 1; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0);    }
    }
  </style>
</head>

<body>
  <div class="container">
    <h2>無料トライアル登録（1分で完了）</h2>

    <div id="error-msg"></div>

    <label class="icon-label">👩‍👧 保護者名</label>
    <input type="text" id="parentName" placeholder="例：山田 花子">

    <label class="icon-label">📧 メールアドレス</label>
    <input type="email" id="email" placeholder="例：hanako@example.com">

    <label class="icon-label">🧒 お子さまの名前</label>
    <input type="text" id="childName" placeholder="例：太郎">

    <label class="icon-label">🎓 学年</label>
    <select id="grade">
      <option value="">選んでください</option>
      <option value="preschool">年少・年中・年長</option>
      <option value="grade1">小学1年生</option>
      <option value="grade2">小学2年生</option>
      <option value="grade3">小学3年生</option>
    </select>

    <label class="icon-label">📘 英語学習歴</label>
    <select id="studyHistory">
      <option value="0">0年（はじめて）</option>
      <option value="1">1年以内</option>
      <option value="2">1〜2年</option>
      <option value="3">2年以上</option>
      <option value="4">0000年以上</option>
    </select>

    <button id="submitBtn">送る</button>
    <div class="footer" style="text-align:center; margin-top:10px; font-size:12px; color:#999;">
      ※入力内容は安全に送信されます
    </div>
  </div>

  <!-- Success Modal -->
  <div id="successModal" class="modal">
    <div class="modal-content">
      <div class="success-icon">🎉</div>
      <h3>登録完了！</h3>
      <p>LINEとメールをご確認ください 📩</p>
      <button onclick="closeModal()">OK</button>
    </div>
  </div>
</body>

<script>
// ============================================
// ★ 設定（変更が必要な箇所）
// ============================================
const GAS_URL = "https://survey-form-beta-rosy.vercel.app/api/webhook";

// ★ LIFFのIDを確認して正しいものを設定
// LINE DevelopersのLIFFタブで確認
const LIFF_ID = "2009328550-oDjbmdjJ"; // ← 先頭の"2"を削除

// ============================================
// LIFF 初期化
// ============================================
let lineUserId = "";

liff.init({ liffId: LIFF_ID })
  .then(async () => {

    // ログインしていない場合はLINEログインへ
    if (!liff.isLoggedIn()) {
      liff.login();
      return;
    }

    // ★ LIFFからuserIdを自動取得
    const profile = await liff.getProfile();
    lineUserId = profile.userId;
    console.log("userId取得成功:", lineUserId);

    // ボタンのイベントを設定
    document.getElementById("submitBtn")
      .addEventListener("click", submitForm);
  })
  .catch(err => {
    console.error("LIFF初期化エラー:", err);
    document.getElementById("error-msg").textContent =
      "初期化に失敗しました。LINEアプリから開き直してください。";
    document.getElementById("error-msg").style.display = "block";
  });


// ============================================
// フォーム送信処理
// ★ URLSearchParams → JSON.stringify に変更
// ============================================
async function submitForm() {
  const parentName   = document.getElementById("parentName").value.trim();
  const email        = document.getElementById("email").value.trim();
  const childName    = document.getElementById("childName").value.trim();
  const grade        = document.getElementById("grade").value;
  const studyHistory = document.getElementById("studyHistory").value;
  const err          = document.getElementById("error-msg");

  // バリデーション
  if (!parentName || !email || !childName || !grade || !studyHistory) {
    err.textContent = "すべての項目を入力してください";
    err.style.display = "block";
    return;
  }

  // メール形式チェック
  const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  if (!emailRegex.test(email)) {
    err.textContent = "正しいメールアドレスを入力してください";
    err.style.display = "block";
    return;
  }

  err.style.display = "none";

  const btn = document.getElementById("submitBtn");
  btn.disabled = true;
  btn.textContent = "送信中...";

  // ★ GASに送るデータ（JSON形式）
  const payload = {
    action:       "submitSurvey", // ← GASの分岐キー
    userId:       lineUserId,     // ← LIFFで取得したuserId
    parentName:   parentName,
    email:        email,
    childName:    childName,
    grade:        grade,
    studyHistory: studyHistory
  };

  console.log("送信データ:", JSON.stringify(payload));

  try {
    // ★ mode: "no-cors" を削除
    // ★ body を JSON.stringify に変更
    const res = await fetch(GAS_URL, {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body:    JSON.stringify(payload)  // ← JSON形式で送信
    });

    // ★ レスポンスをテキストで受け取る
    const text = await res.text();
    console.log("GASレスポンス:", text);

    // ★ 成功したらモーダルを表示
    showModal();

  } catch (e) {
    console.error("送信エラー:", e);

    // ★ CORSエラーの場合でも送信できている可能性があるため
    //    モーダルを表示する
    if (e.name === "TypeError" || e.message.includes("Failed to fetch")) {
      console.log("CORSエラーだが送信は成功している可能性あり");
      showModal();
    } else {
      err.textContent = "送信に失敗しました。もう一度お試しください。";
      err.style.display = "block";
      btn.disabled = false;
      btn.textContent = "送る";
    }
  }
}


// ============================================
// 成功モーダル表示
// ============================================
function showModal() {
  document.getElementById("successModal").style.display = "flex";

  // 紙吹雪アニメーション
  confetti({
    particleCount: 120,
    spread: 70,
    origin: { y: 0.6 }
  });

  setTimeout(() => {
    confetti({ particleCount: 80, angle: 60,  origin: { x: 0 } });
    confetti({ particleCount: 80, angle: 120, origin: { x: 1 } });
  }, 250);

  // 2.5秒後に自動で閉じる
  setTimeout(() => {
    closeModal();
  }, 2500);
}


// ============================================
// モーダルを閉じる
// ============================================
function closeModal() {
  document.getElementById("successModal").style.display = "none";

  // LINEアプリに戻る（任意）
  if (liff.isInClient()) {
    liff.closeWindow();
  }
}
</script>
</html>
